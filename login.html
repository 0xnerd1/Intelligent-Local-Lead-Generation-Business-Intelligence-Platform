{% extends "base.html" %}
{% block title %}Sign in · {{ APP_NAME }}{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
  <div class="absolute inset-0 -z-10">
    <div class="absolute -top-40 -left-40 w-[36rem] h-[36rem] rounded-full bg-blue-600/20 blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-[40rem] h-[40rem] rounded-full bg-purple-600/20 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 items-center justify-center mb-4">
        <i class="bi bi-geo-alt-fill text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-black tracking-tight">Local Lead Finder <span class="text-blue-400">Pro</span></h1>
      <p class="text-slate-400 mt-2 text-sm">Find local businesses. Score them. Win them.</p>
    </div>

    <div class="glass-card p-6 lg:p-8">
      <div class="flex gap-1 p-1 bg-slate-800/60 rounded-lg text-sm font-semibold mb-6">
        <button id="tab-login" class="auth-tab auth-tab-active flex-1">Sign in</button>
        <button id="tab-register" class="auth-tab flex-1">Create account</button>
      </div>

      <!-- LOGIN -->
      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Email</label>
          <input type="email" name="email" required class="form-input mt-1" placeholder="demo@leadfinder.com" value="demo@leadfinder.com" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
          <input type="password" name="password" required class="form-input mt-1" placeholder="••••••••" value="demo123" />
        </div>
        <button type="submit" class="btn-primary w-full">Sign in <i class="bi bi-arrow-right"></i></button>
        <p class="text-[11px] text-slate-500 text-center pt-2">
          Demo account: <code class="text-slate-300">demo@leadfinder.com</code> / <code class="text-slate-300">demo123</code>
        </p>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="space-y-4 hidden">
        <div>
          <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Username</label>
          <input type="text" name="username" required class="form-input mt-1" placeholder="janedoe" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Email</label>
          <input type="email" name="email" required class="form-input mt-1" placeholder="jane@example.com" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
          <input type="password" name="password" required minlength="6" class="form-input mt-1" placeholder="At least 6 characters" />
        </div>
        <button type="submit" class="btn-primary w-full">Create account</button>
      </form>
    </div>
  </div>
</div>

<script>
  const tabs = { login: document.getElementById('tab-login'), register: document.getElementById('tab-register') };
  const forms = { login: document.getElementById('login-form'), register: document.getElementById('register-form') };
  function show(which) {
    for (const k in tabs) tabs[k].classList.toggle('auth-tab-active', k === which);
    for (const k in forms) forms[k].classList.toggle('hidden', k !== which);
  }
  tabs.login.onclick = () => show('login');
  tabs.register.onclick = () => show('register');

  forms.login.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(forms.login);
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
    });
    const data = await r.json();
    if (!r.ok) return LeadFinder.toast(data.error || 'Login failed', 'error');
    window.location.href = '/dashboard';
  });

  forms.register.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(forms.register);
    const r = await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        username: fd.get('username'), email: fd.get('email'), password: fd.get('password'),
      }),
    });
    const data = await r.json();
    if (!r.ok) return LeadFinder.toast(data.error || 'Registration failed', 'error');
    window.location.href = '/dashboard';
  });
</script>
{% endblock %}
